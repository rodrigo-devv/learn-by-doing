  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{background:var(--bg,#060912);font-family:'IBM Plex Mono','SFMono-Regular',Menlo,monospace;color:var(--ink,#cddaef);-webkit-font-smoothing:antialiased;font-size:14px;transition:background .3s ease,color .3s ease;}
  input,textarea,select,button{font-family:inherit;}
  textarea{resize:vertical;}
  input:focus,textarea:focus,select:focus{outline:none;}
  ::placeholder{color:var(--faint,#3d5070);}

  @keyframes tuiBlink{0%,49%{opacity:1;}50%,100%{opacity:0;}}
  @keyframes akFadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  @keyframes akPulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  @keyframes akRingIn{from{stroke-dashoffset:352;}to{stroke-dashoffset:var(--ring-offset,352);}}

  #loading{min-height:100vh;display:flex;align-items:center;justify-content:center;color:var(--faint,#3d5070);font-size:12px;letter-spacing:.16em;text-transform:uppercase;}

  /* card hover */
  .ak-card{transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease;}
  .ak-card:hover{transform:translateY(-2px);box-shadow:0 0 0 1px rgba(0,200,216,.22),0 14px 36px rgba(0,0,0,.55)!important;border-color:rgba(0,200,216,.28)!important;}

  /* timeline item hover */
  .ak-item{transition:border-color .18s ease,box-shadow .18s ease;}
  .ak-item:hover{border-color:rgba(0,200,216,.32)!important;box-shadow:0 2px 14px rgba(0,0,0,.3)!important;}

  /* view fade in */
  .ak-fade{animation:akFadeUp .38s ease both;}

  /* staggered card entrance */
  .ak-fade-1{animation:akFadeUp .38s .06s ease both;}
  .ak-fade-2{animation:akFadeUp .38s .12s ease both;}
  .ak-fade-3{animation:akFadeUp .38s .18s ease both;}
  .ak-fade-4{animation:akFadeUp .38s .24s ease both;}

  /* "doing" dot pulse */
  .ak-pulse{animation:akPulse 2.6s ease-in-out infinite;}

  /* primary button hover */
  .ak-btn{transition:box-shadow .18s ease,transform .18s ease;}
  .ak-btn:hover{transform:translateY(-1px);box-shadow:0 4px 22px rgba(0,200,216,.38)!important;}

  /* secondary button hover */
  .ak-btn-sec{transition:border-color .15s,color .15s;}
  .ak-btn-sec:hover{border-color:rgba(0,200,216,.5)!important;color:var(--ink,#cddaef)!important;}

  /* focus rings */
  input:focus,textarea:focus,select:focus{box-shadow:0 0 0 2px rgba(0,200,216,.18);}

<script type="text/plain" id="akademia-src">
const { useState, useEffect, useRef } = React;

const API = "";
const TOKEN_KEY = "akademia-token";
const getToken = () => { try { return localStorage.getItem(TOKEN_KEY) || ""; } catch (e) { return ""; } };
const setToken = (t) => { try { localStorage.setItem(TOKEN_KEY, t); } catch (e) {} };

class AuthError extends Error {}

async function api(method, path, body) {
  const headers = { "Content-Type": "application/json" };
  const token = getToken();
  if (token) headers["Authorization"] = "Bearer " + token;
  const res = await fetch(API + path, {
    method,
    headers,
    body: body !== undefined ? JSON.stringify(body) : undefined,
  });
  if (res.status === 401) throw new AuthError("Não autorizado");
  if (res.status === 204) return null;
  if (!res.ok) throw new Error(`${method} ${path} -> ${res.status}`);
  return res.json();
}

// ============ constantes de tema ============
const ORDER = ["todo", "doing", "done"];

const STATUS_LIGHT = {
  todo:  { label: "a fazer",      dot: "#5a80b0", text: "#344f70", bg: "rgba(90,128,176,.1)" },

const STATUS_DARK = {

  done:  { label: "concluído",    dot: "#00a878", text: "#00c890", bg: "rgba(0,168,120,.15)" },

    "--dashed": "#1c3060", "--ink": "#cddaef", "--muted": "#587090", "--faint": "#3a5068",
    "--track": "#0f1828", "--line": "#192840",
    "--st-todo": "#3a5878", "--st-doing": "#c88020", "--st-done": "#00a878",

const ACCENT = "#00c8d8";
const THEME_KEY = "akademia-theme";

// status das atividades (cores funcionam nos dois temas)
const ACT_STATUS = {
  pendente:  { label: "pendente",  color: "#c88020" },
  entregue:  { label: "entregue",  color: "#3a78c8" },
  corrigida: { label: "corrigida", color: "#00a878" },

// ============ detecção de plataforma e ícones ============
const PLATFORMS = {
  github:       { label: "GitHub",       abbr: null,   color: "#d0dcee", bg: "rgba(208,220,238,.1)"  },
  vercel:       { label: "Vercel",       abbr: null,   color: "#f0f0f0", bg: "rgba(240,240,240,.08)" },
  railway:      { label: "Railway",      abbr: "RY",   color: "#a855f7", bg: "rgba(168,85,247,.14)"  },
  aws:          { label: "AWS",          abbr: "aws",  color: "#ff9900", bg: "rgba(255,153,0,.14)"   },
  azure:        { label: "Azure",        abbr: "az",   color: "#4fa6ea", bg: "rgba(79,166,234,.14)"  },
  netlify:      { label: "Netlify",      abbr: "NL",   color: "#00c7b7", bg: "rgba(0,199,183,.14)"   },
  heroku:       { label: "Heroku",       abbr: "HK",   color: "#c9a0f6", bg: "rgba(201,160,246,.14)" },
  render:       { label: "Render",       abbr: "RN",   color: "#46e3b7", bg: "rgba(70,227,183,.14)"  },
  fly:          { label: "Fly.io",       abbr: "fly",  color: "#a78bfa", bg: "rgba(167,139,250,.14)" },
  digitalocean: { label: "DigitalOcean", abbr: "DO",   color: "#2094f3", bg: "rgba(32,148,243,.14)"  },
  link:         { label: "Link",         abbr: "↗",    color: "#00c8d8", bg: "rgba(0,200,216,.1)"    },
